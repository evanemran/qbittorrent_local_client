name: qbittorrent_local_client
description: "A qBittorrent remote client for locally hosted instances."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  dio: ^5.8.0+1
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.2.0
  shared_preferences: ^2.5.3
  file_picker: ^10.1.9
  path_provider: ^2.1.5
  uuid: ^4.5.1
  flutter_local_notifications: ^19.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
